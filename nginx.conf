##############################################################################
# NDU Distant Təhsil Sistemi — Nginx Site Configuration
# Place in /etc/nginx/sites-available/distant.ndu.edu.az
# then: ln -s /etc/nginx/sites-available/distant.ndu.edu.az /etc/nginx/sites-enabled/
#
# IMPORTANT — add these two lines to the http {} block in /etc/nginx/nginx.conf:
#   limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
#   limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/m;
##############################################################################

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name distant.ndu.edu.az;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name distant.ndu.edu.az;

    root  /var/www/distant_ndu;
    index index.php index.html;

    server_tokens off;

    # -------------------------------------------------------------------------
    # SSL (Certbot-managed certificates)
    # -------------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/distant.ndu.edu.az/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/distant.ndu.edu.az/privkey.pem;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # NOTE: ssl_protocols, ssl_ciphers, and ssl_session_* must be set once,
    # globally in the http {} block of /etc/nginx/nginx.conf to avoid the
    # "protocol options redefined" warning when multiple server blocks share
    # the same listening address. Add these there:
    #
    #   ssl_protocols             TLSv1.2 TLSv1.3;
    #   ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    #   ssl_prefer_server_ciphers off;
    #   ssl_session_timeout       1d;
    #   ssl_session_cache         shared:SSL:10m;
    #   ssl_session_tickets       off;

    # -------------------------------------------------------------------------
    # Security Headers
    # -------------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "camera=(self), microphone=(self), geolocation=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.jsdelivr.net https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://tmis.ndu.edu.az; connect-src 'self' https://tmis.ndu.edu.az https://unpkg.com https://0.peerjs.com wss://0.peerjs.com; media-src 'self' blob:; object-src 'none'; frame-ancestors 'self';"
        always;

    # -------------------------------------------------------------------------
    # Upload size — 512M to support video uploads (adjust PHP post_max_size too)
    # -------------------------------------------------------------------------
    client_max_body_size 512M;

    # -------------------------------------------------------------------------
    # Block sensitive paths
    # -------------------------------------------------------------------------

    # Block /token endpoint
    location = /token {
        deny all;
        return 403;
    }

    # Block .env files
    location ~* /\.env {
        deny all;
        return 404;
    }

    # Block all dotfiles (.git, .htaccess, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Block log, raw text, JSON, and SQL files
    location ~* \.(log|sql)$ {
        deny all;
        return 404;
    }

    # Block debug/dump utility scripts
    location ~* ^/(teacher|student)/api/(inspect_users|dump_json|dump_lc_cols|dump_one_subject|fix_stream_specialties|debug_tmis)\.php$ {
        deny all;
        return 404;
    }

    # Block exposed raw data files in api directories
    location ~* ^/(teacher|student)/api/(dump\.json|tables\.json|subjects_schema\.txt|lc_cols\.json|debug_tmis\.txt)$ {
        deny all;
        return 404;
    }

    # Block PHP execution inside the uploads directory
    location ^~ /uploads/ {
        location ~* \.(php|phtml|php3|php4|php5|php7|phar|cgi|pl|py|sh|exe|bat)$ {
            deny all;
            return 403;
        }
        location ~* \.(mp4|webm|pdf|doc|docx|xls|xlsx|ppt|pptx|jpg|jpeg|png|gif)$ {
            add_header X-Content-Type-Options "nosniff" always;
            expires 7d;
        }
    }

    # Block PHP execution inside assets directories
    location ~* ^/(teacher|student)/assets/.*\.php$ {
        deny all;
        return 403;
    }

    # Block direct access to config and includes directories
    location ~* ^/(teacher|student)/(config|includes)/.*$ {
        deny all;
        return 403;
    }

    # -------------------------------------------------------------------------
    # Unlimited live-streaming endpoints (chunk flushes + final recording upload)
    # These must appear before the rate-limited api blocks below.
    # -------------------------------------------------------------------------
    location = /api/live/upload_chunk.php {
        try_files $uri =404;
        fastcgi_pass  unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 3600;
        fastcgi_send_timeout 3600;
        fastcgi_param PHP_VALUE "display_errors=0\nlog_errors=1\nexpose_php=Off\nsession.cookie_httponly=1\nsession.cookie_secure=1\nsession.cookie_samesite=Strict\nsession.use_strict_mode=1\nsession.use_only_cookies=1";
    }

    location = /teacher/api/upload_recording.php {
        try_files $uri =404;
        fastcgi_pass  unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 3600;
        fastcgi_send_timeout 3600;
        fastcgi_param PHP_VALUE "display_errors=0\nlog_errors=1\nexpose_php=Off\nsession.cookie_httponly=1\nsession.cookie_secure=1\nsession.cookie_samesite=Strict\nsession.use_strict_mode=1\nsession.use_only_cookies=1";
    }

    # -------------------------------------------------------------------------
    # Rate-limited login endpoints
    # -------------------------------------------------------------------------
    location ~* ^/(teacher|student)/login\.php$ {
        limit_req zone=login burst=3 nodelay;
        try_files $uri =404;
        fastcgi_pass  unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "display_errors=0\nlog_errors=1\nexpose_php=Off\nsession.cookie_httponly=1\nsession.cookie_secure=1\nsession.cookie_samesite=Strict\nsession.use_strict_mode=1\nsession.use_only_cookies=1";
    }

    # Rate-limited API endpoints (teacher/student sub-APIs)
    location ~* ^/(teacher|student)/api/.*\.php$ {
        limit_req zone=api burst=20 nodelay;
        try_files $uri =404;
        fastcgi_pass  unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "display_errors=0\nlog_errors=1\nexpose_php=Off\nsession.cookie_httponly=1\nsession.cookie_secure=1\nsession.cookie_samesite=Strict\nsession.use_strict_mode=1\nsession.use_only_cookies=1";
    }

    # Rate-limited shared /api/ endpoints
    location ~* ^/api/.*\.php$ {
        limit_req zone=api burst=20 nodelay;
        try_files $uri =404;
        fastcgi_pass  unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "display_errors=0\nlog_errors=1\nexpose_php=Off\nsession.cookie_httponly=1\nsession.cookie_secure=1\nsession.cookie_samesite=Strict\nsession.use_strict_mode=1\nsession.use_only_cookies=1";
    }

    # -------------------------------------------------------------------------
    # Static assets
    # -------------------------------------------------------------------------
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # -------------------------------------------------------------------------
    # Routing — extensionless PHP support (e.g. /teacher/live-lessons)
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ @extensionless_php;
    }

    location @extensionless_php {
        rewrite ^(.*)$ $1.php last;
    }

    # -------------------------------------------------------------------------
    # PHP-FPM catch-all
    # -------------------------------------------------------------------------
    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_pass  unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        fastcgi_param PHP_VALUE "
            display_errors=0
            log_errors=1
            expose_php=Off
            session.cookie_httponly=1
            session.cookie_secure=1
            session.cookie_samesite=Strict
            session.use_strict_mode=1
            session.use_only_cookies=1
        ";

        # Generous timeouts for large video uploads
        fastcgi_read_timeout 3600;
        fastcgi_send_timeout 3600;
    }

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    access_log /var/log/nginx/distant_access.log;
    error_log  /var/log/nginx/distant_error.log warn;
}
