##############################################################################
# LiveKit Server Reverse Proxy Configuration
# Place in /etc/nginx/sites-available/distant-l.ndu.edu.az
# then: ln -s /etc/nginx/sites-available/distant-l.ndu.edu.az /etc/nginx/sites-enabled/
#
# Proxies requests to LiveKit Docker container running on localhost:7880/7881
##############################################################################

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name distant-l.ndu.edu.az;
    return 301 https://$host$request_uri;
}

# Upstream definition
upstream livekit_backend {
    server 127.0.0.1:7880;
    server 127.0.0.1:7881;
}

server {
    listen 443 ssl http2;
    server_name distant-l.ndu.edu.az;

    server_tokens off;

    # -------------------------------------------------------------------------
    # SSL (Certbot-managed certificates)
    # -------------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/distant-l.ndu.edu.az/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/distant-l.ndu.edu.az/privkey.pem;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # NOTE: Rate limiting zones are defined in the http {} block of nginx.conf
    # Add these lines to /etc/nginx/nginx.conf in the http {} block:
    #
    #   # Rate limiting zones for LiveKit
    #   limit_req_zone $binary_remote_addr zone=livekit_api:10m rate=100r/m;
    #   limit_req_zone $binary_remote_addr zone=livekit_ws:10m rate=1000r/m;
    #
    # Also add SSL configuration to http {} block:
    #   ssl_protocols             TLSv1.2 TLSv1.3;
    #   ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    #   ssl_prefer_server_ciphers off;
    #   ssl_session_timeout       1d;
    #   ssl_session_cache         shared:SSL:10m;
    #   ssl_session_tickets       off;

    # -------------------------------------------------------------------------
    # Security Headers
    # -------------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "no-referrer"                                  always;

    # -------------------------------------------------------------------------
    # Client Upload Size (for Egress recordings)
    # -------------------------------------------------------------------------
    client_max_body_size 1G;

    # -------------------------------------------------------------------------
    # LiveKit Stats Endpoint (HTTP GET)
    # -------------------------------------------------------------------------
    location = /stats {
        proxy_pass http://livekit_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
    }

    # -------------------------------------------------------------------------
    # LiveKit Twirp API Endpoints (gRPC-Web over HTTP/2)
    # Handles: /twirp/livekit.RoomService/*, /twirp/livekit.Egress/*, etc.
    # -------------------------------------------------------------------------
    location /twirp/ {
        proxy_pass http://livekit_backend;
        proxy_http_version 1.1;
        
        # Required for gRPC/Twirp
        proxy_buffering off;
        proxy_cache off;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Connection upgrade for gRPC streaming
        proxy_set_header Connection "";
        proxy_set_header Upgrade $http_upgrade;
        
        # Timeouts for long-running operations
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        
        # Disable request body size limit for Egress data
        client_max_body_size 0;
    }

    # -------------------------------------------------------------------------
    # LiveKit WebSocket Signaling (wss://)
    # Protocol upgrade for real-time signaling
    # -------------------------------------------------------------------------
    location / {
        proxy_pass http://livekit_backend;
        proxy_http_version 1.1;
        
        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_read_timeout 3600s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        
        # Buffering
        proxy_buffering off;
        proxy_cache off;
    }

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    access_log /var/log/nginx/distant-l_access.log;
    error_log  /var/log/nginx/distant-l_error.log warn;

    # -------------------------------------------------------------------------
    # Health Check (monitoring)
    # -------------------------------------------------------------------------
    location /.well-known/health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
